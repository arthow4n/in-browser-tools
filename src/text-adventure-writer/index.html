<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Adventure Writer</title>
    <style>
      *,
      *:before,
      *:after {
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      section {
        margin-bottom: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      h2 {
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type='text'],
      input[type='password'],
      textarea,
      select {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
      }
      button {
        padding: 8px 15px;
        cursor: pointer;
        margin-right: 5px;
        margin-bottom: 5px;
      }
      .message {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #eee;
        white-space: pre-wrap;
      }
      .message.user {
        background-color: #e3f2fd;
      }
      .message.narrator {
        background-color: #f5f5f5;
        font-style: italic;
      }
      .message.character {
        background-color: #fff3e0;
      }
      .message.system {
        background-color: #e8f5e9;
      }
      .character-name {
        font-weight: bold;
        margin-bottom: 5px;
        display: block;
      }
      .history-container {
        max-height: 500px;
        overflow-y: auto;
        margin-bottom: 10px;
        padding-right: 10px;
      }
      .streaming {
        border-left: 3px solid #2196f3;
      }
    </style>
  </head>
  <body>
    <h1>Text Adventure Writer</h1>
    <a href="./">← Back to Tools</a>

    <div id="setup-view">
      <section id="settings-section">
        <h2>Settings</h2>
        <div id="llm-settings-container">
          <label for="shared-api-key">OpenRouter API Key:</label>
          <input type="password" id="shared-api-key" placeholder="sk-or-v1-..." />

          <label for="shared-model-input">Model:</label>
          <input
            type="text"
            id="shared-model-input"
            list="shared-models-list"
            placeholder="e.g. google/gemini-2.5-flash"
          />
          <ul id="shared-models-list" style="display: none"></ul>
          <button id="fetch-models-btn" style="margin-top: 5px">
            Fetch Models
          </button>
        </div>
      </section>

      <section id="scenario-setup-section">
        <h2>Game Setup</h2>
        <label for="scenario-request">Scenario / Setting:</label>
        <textarea
          id="scenario-request"
          rows="3"
          placeholder="e.g., A fantasy world where magic is outlawed..."
        ></textarea>

        <label for="character-description">Your Character:</label>
        <textarea
          id="character-description"
          rows="3"
          placeholder="e.g., Elara, a rogue mage with a quick wit..."
        ></textarea>

        <button
          id="start-game-btn"
          style="
            width: 100%;
            padding: 12px;
            font-weight: bold;
            background-color: #4caf50;
            color: white;
            border: none;
            margin-top: 10px;
          "
        >
          Start Adventure
        </button>
      </section>
    </div>

    <div id="game-view" style="display: none;">
      <section id="chat-section">
        <h2>Story</h2>
        <div class="history-container" id="history-container">
          <!-- Messages will be rendered here -->
        </div>

        <div style="display: flex; gap: 10px; align-items: flex-start;">
          <textarea
            id="user-input"
            rows="2"
            placeholder="What do you do?"
            style="flex-grow: 1; margin-bottom: 0;"
          ></textarea>
          <button
            id="send-btn"
            style="
              padding: 10px 20px;
              font-weight: bold;
              background-color: #2196f3;
              color: white;
              border: none;
              height: 100%;
            "
          >
            Submit
          </button>
        </div>
        <span
          id="chat-status"
          style="font-weight: bold; display: block; margin-top: 10px"
        ></span>
        <button
          id="restart-btn"
          style="width: 100%; margin-top: 10px; margin-bottom: 20px"
        >
          Restart Game
        </button>

        <details
          id="advanced-details"
          style="
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 5px;
            background: #fafafa;
          "
        >
          <summary style="cursor: pointer; font-weight: bold">
            Advanced: Underlying Chat Conversation
          </summary>
          <div style="margin-top: 10px; font-size: 0.9em; color: #555">
            This section shows the raw conversation sent to the LLM, including
            system prompts and tool calls.
          </div>
          <div
            class="history-container"
            id="advanced-history-container"
            style="
              margin-top: 15px;
              border-top: 1px solid #ddd;
              padding-top: 10px;
            "
          >
            <!-- Advanced messages will be rendered here -->
          </div>
        </details>
      </section>
    </div>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
