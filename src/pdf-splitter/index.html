<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Splitter</title>
    <style>
      body {
        font-family: sans-serif;
        line-height: 1.6;
        margin: 0 auto;
        padding: 20px;
        max-width: 800px;
        box-sizing: border-box;
      }
      *,
      *:before,
      *:after {
        box-sizing: inherit;
      }
      .input-group {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 15px;
      }
      input {
        max-width: 100%;
      }
      button {
        padding: 8px 16px;
      }
    </style>
  </head>
  <body>
    <h1>PDF Splitter</h1>
    <a href="../index.html" style="display: inline-block; margin-bottom: 1em"
      >← Back to Tools</a
    >
    <div class="input-group">
      <label for="pdf-file">Upload PDF file:</label>
      <input type="file" id="pdf-file" accept="application/pdf" />
    </div>
    <div class="input-group">
      <label for="pages">Split every X pages:</label>
      <input type="number" id="pages" value="1" min="1" />
    </div>
    <button id="split-btn">Split PDF</button>

    <div id="status" style="margin-top: 1em; word-wrap: break-word"></div>
    <ul id="output-list" style="margin-top: 1em"></ul>
  </body>
</html>
