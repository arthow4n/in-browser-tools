<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Chat</title>
    <style>
      *,
      *:before,
      *:after {
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      section {
        margin-bottom: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      h2 {
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type='text'],
      input[type='password'],
      textarea,
      select {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
      }
      button {
        padding: 8px 15px;
        cursor: pointer;
        margin-right: 5px;
        margin-bottom: 5px;
      }
      .message {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #eee;
        white-space: pre-wrap;
      }
      .message.user {
        background-color: #e3f2fd;
      }
      .message.assistant {
        background-color: #f5f5f5;
      }
      .message-controls {
        margin-top: 10px;
        text-align: right;
      }
      .message-controls button {
        padding: 4px 8px;
        font-size: 0.8em;
      }
      .history-container {
        max-height: 500px;
        overflow-y: auto;
        margin-bottom: 10px;
        padding-right: 10px;
      }
      .flex-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }
      .flex-row > * {
        margin-bottom: 0;
      }
      .streaming {
        border-left: 3px solid #2196f3;
      }
    </style>
  </head>
  <body>
    <h1>LLM Chat</h1>
    <a href="../index.html">← Back to Tools</a>

    <section id="settings-section">
      <h2>Settings</h2>
      <label for="api-key">OpenRouter API Key:</label>
      <input type="password" id="api-key" placeholder="sk-or-v1-..." />

      <div class="flex-row">
        <div style="flex-grow: 1">
          <label for="model-input">Model:</label>
          <input
            type="text"
            id="model-input"
            list="models-list"
            placeholder="Select or type model ID..."
          />
          <datalist id="models-list"></datalist>
        </div>
        <button id="fetch-models-btn" style="margin-top: 24px">
          Fetch Models
        </button>
      </div>
    </section>

    <section id="system-prompt-section">
      <h2>System Prompt</h2>
      <textarea id="system-prompt" rows="3"></textarea>

      <div class="flex-row">
        <button id="improve-prompt-btn">Improve Prompt with LLM</button>
        <button id="save-prompt-btn">Save Prompt As...</button>
        <select id="saved-prompts-select">
          <option value="">-- Load Saved Prompt --</option>
        </select>
        <button id="delete-prompt-btn" style="display: none">Delete</button>
      </div>
    </section>

    <section id="chat-section">
      <h2>Chat</h2>
      <div class="history-container" id="history-container">
        <!-- Messages will be rendered here -->
      </div>

      <label for="user-input">New Message:</label>
      <textarea
        id="user-input"
        rows="4"
        placeholder="Type your message here..."
      ></textarea>
      <button
        id="send-btn"
        style="
          width: 100%;
          padding: 10px;
          font-weight: bold;
          background-color: #4caf50;
          color: white;
          border: none;
        "
      >
        Send
      </button>
      <button id="clear-history-btn" style="width: 100%; margin-top: 10px">
        Clear History
      </button>
    </section>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
