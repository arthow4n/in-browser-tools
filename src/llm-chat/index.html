<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LLM Chat</title>
    <style>
      *,
      *:before,
      *:after {
        box-sizing: border-box;
      }
      body {
        font-family: sans-serif;
        line-height: 1.6;
        margin: 0;
        padding: 20px;
        max-width: 800px;
        margin: 0 auto;
      }
      section {
        margin-bottom: 20px;
        padding: 15px;
        border: 1px solid #ccc;
        border-radius: 5px;
      }
      h2 {
        margin-top: 0;
      }
      label {
        display: block;
        margin-bottom: 5px;
        font-weight: bold;
      }
      input[type='text'],
      input[type='password'],
      textarea,
      select {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        box-sizing: border-box;
      }
      button {
        padding: 8px 15px;
        cursor: pointer;
        margin-right: 5px;
        margin-bottom: 5px;
      }
      .message {
        padding: 10px;
        margin-bottom: 10px;
        border-radius: 5px;
        border: 1px solid #eee;
        white-space: pre-wrap;
      }
      .message.user {
        background-color: #e3f2fd;
      }
      .message.assistant {
        background-color: #f5f5f5;
      }
      .message-controls {
        margin-top: 10px;
        text-align: right;
      }
      .message-controls button {
        padding: 4px 8px;
        font-size: 0.8em;
      }
      .history-container {
        max-height: 500px;
        overflow-y: auto;
        margin-bottom: 10px;
        padding-right: 10px;
      }
      .flex-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 10px;
      }
      .flex-row > * {
        margin-bottom: 0;
      }
      .streaming {
        border-left: 3px solid #2196f3;
      }
    </style>
  </head>
  <body>
    <h1>LLM Chat</h1>
    <a href="./">← Back to Tools</a>

    <section id="settings-section">
      <h2>Settings</h2>
      <div id="llm-settings-container"></div>
      <div style="margin-top: 10px">
        <label
          style="
            display: flex;
            align-items: center;
            gap: 5px;
            font-weight: normal;
          "
        >
          <input type="checkbox" id="enable-tools-checkbox" />
          Enable Tools
        </label>
      </div>
    </section>

    <section id="system-prompt-section">
      <h2>System Prompt</h2>
      <textarea id="system-prompt" rows="3"></textarea>

      <details style="margin-bottom: 10px; margin-top: 10px">
        <summary style="cursor: pointer; font-weight: bold">
          Improvement Settings
        </summary>
        <div
          style="
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #eee;
            border-radius: 5px;
          "
        >
          <label for="prompt-intention">Intention (Optional):</label>
          <textarea
            id="prompt-intention"
            rows="2"
            placeholder="What is the purpose of this prompt?"
          ></textarea>

          <label for="prompt-how-to-improve">How to Improve (Optional):</label>
          <textarea
            id="prompt-how-to-improve"
            rows="2"
            placeholder="How should it be improved?"
          ></textarea>

          <label for="prompt-evaluation-focus"
            >Evaluation Focus (Optional):</label
          >
          <textarea
            id="prompt-evaluation-focus"
            rows="2"
            placeholder="What to focus on during evaluation?"
          ></textarea>
        </div>
      </details>

      <div class="flex-row">
        <button id="improve-prompt-btn">Improve Prompt with LLM</button>
        <span
          id="improve-prompt-status"
          style="font-weight: bold; margin-left: 10px"
        ></span>
        <button id="save-prompt-btn">Save Prompt As...</button>
        <select id="saved-prompts-select">
          <option value="">-- Load Saved Prompt --</option>
        </select>
        <button id="delete-prompt-btn" style="display: none">Delete</button>
      </div>
    </section>

    <section id="chat-section">
      <h2>Chat</h2>
      <div class="history-container" id="history-container">
        <!-- Messages will be rendered here -->
      </div>

      <label for="user-input">New Message:</label>
      <textarea
        id="user-input"
        rows="4"
        placeholder="Type your message here..."
      ></textarea>
      <button
        id="send-btn"
        style="
          width: 100%;
          padding: 10px;
          font-weight: bold;
          background-color: #4caf50;
          color: white;
          border: none;
        "
      >
        Send
      </button>
      <span
        id="chat-status"
        style="font-weight: bold; display: block; margin-top: 10px"
      ></span>
      <button id="clear-history-btn" style="width: 100%; margin-top: 10px">
        Clear History
      </button>
    </section>

    <script type="module" src="./index.ts"></script>
  </body>
</html>
