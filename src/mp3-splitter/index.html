<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>MP3 Splitter</title>
  </head>
  <body>
    <h1>MP3 Splitter</h1>
    <div>
      <label for="mp3-file">Upload MP3 or M4A file:</label>
      <input type="file" id="mp3-file" accept="audio/mpeg,audio/mp4,audio/x-m4a,.m4a" />
    </div>
    <div>
      <label for="minutes">Split every X minutes:</label>
      <input type="number" id="minutes" value="30" min="1" />
    </div>
    <button id="split-btn">Split MP3</button>

    <div id="status" style="margin-top: 1em"></div>
    <ul id="output-list" style="margin-top: 1em"></ul>
  </body>
</html>
